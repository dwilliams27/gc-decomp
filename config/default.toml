[melee]
repo_path = "/Users/dwilliams/proj/melee-fork/melee"
version = "GALE01"
build_dir = "build"

[agent]
model = "gpt-5.4"
max_iterations = 30
max_tokens_per_attempt = 2000000
max_ctx_chars = 20000

[docker]
enabled = true
container_name = "docker-worker-1"
image = "ghcr.io/doldecomp/build-melee:main"

[claude_code]
enabled = false
container_name = "docker-worker-1"
timeout_seconds = 3600
max_turns = 50
warm_start_turns = 80
near_match_turns = 150
warm_start_timeout_seconds = 3600
near_match_timeout_seconds = 5400
warm_start_threshold_pct = 80.0
near_match_threshold_pct = 95.0
file_mode_max_turns = 150
file_mode_timeout_seconds = 7200
orchestrator_max_turns = 10
orchestrator_timeout_seconds = 600
isolated_worker_enabled = false
worker_root = "/tmp/decomp-claude-workers"
image = "decomp-agent-worker:latest"

[codex_code]
enabled = false
container_name = "docker-worker-1"
timeout_seconds = 1800
isolated_worker_enabled = false
worker_root = "/tmp/decomp-codex-workers"
image = "decomp-agent-worker:latest"

[ghidra]
enabled = false
project_path = "/Users/dwilliams/proj/melee-fork/melee/.ghidra"
project_name = "MeleeProject"
program_path = "/main.dol"

[orchestration]
db_path = "decomp.db"
batch_size = 50
default_workers = 1
max_attempts_per_function = 10
# default_budget — omit to leave unlimited

[campaign]
orchestrator_provider = "claude"
worker_provider_policy = "claude"
max_active_workers = 2
timeout_hours = 8
max_no_progress_cycles = 6
baseline_compile_retries = 1
rate_limit_backoff_seconds = 300
rate_limit_reset_hours = 5
orchestrator_poll_seconds = 30
root_dir = "/tmp/decomp-campaigns"
allow_shared_fix_workers = false
allow_temporary_unmatched_regressions = false

# TODO: Look up actual gpt-5.4 pricing — these are estimates
[pricing.models."gpt-5.4"]
input_per_million = 2.00
cached_input_per_million = 0.20
output_per_million = 16.00

[pricing.models."o3"]
input_per_million = 10.00
cached_input_per_million = 2.50
output_per_million = 40.00

[pricing.models."o4-mini"]
input_per_million = 1.10
cached_input_per_million = 0.275
output_per_million = 4.40

[pricing.models."claude-sonnet-4-20250514"]
input_per_million = 3.00
cached_input_per_million = 0.30
output_per_million = 15.00

[logging]
level = "INFO"
json_format = false
