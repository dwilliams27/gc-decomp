services:
  proxy:
    image: ubuntu/squid:latest
    networks: [internal, external]
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    platform: linux/amd64
    networks: [internal]
    environment:
      HTTPS_PROXY: http://proxy:3128
      HTTP_PROXY: http://proxy:3128
      DECOMP_CONFIG: /app/config/container.toml
      CODEX_AUTH_SEED: /seed/codex/auth.json
      MAX_MCP_OUTPUT_TOKENS: "50000"
      PYTHONPATH: /workspace/gc-decomp/src
    volumes:
      - ${MELEE_REPO_PATH}:${MELEE_REPO_PATH}:rw
      - /tmp/decomp-campaigns:/tmp/decomp-campaigns:rw
      - ${HOME}/.claude:/home/decomp/.claude:rw
      - ${HOME}/.codex/auth.json:/seed/codex/auth.json:ro
      - ..:/workspace/gc-decomp:rw
      - ../docker/mcp.json:/app/mcp.json:ro
      - ../docker/system-prompt.md:/app/system-prompt.md:ro
      - ../docker/config/container.toml:/app/config/container.toml:ro
    entrypoint: ["/app/worker-entrypoint.sh"]
    command: ["sleep", "infinity"]
    mem_limit: 8g
    depends_on:
      - proxy

networks:
  internal:
    internal: true    # No outbound internet
  external:
    driver: bridge    # Normal internet access (proxy only)
